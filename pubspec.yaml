name: finwise
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  custom_sliding_segmented_control: ^1.8.5
  date_field: ^6.0.3+1
  device_preview: ^1.3.1
  fl_chart: ^1.2.0
  flip_card: ^0.7.0
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.10
  gap: ^3.0.1
  go_router: ^17.1.0
  lottie: ^3.3.2
  percent_indicator: ^4.2.5
  table_calendar: ^3.2.0
  verification_code_field: ^1.2.4
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.7.0
  google_sign_in: ^7.2.0
  flutter_facebook_auth: ^7.2.0
  intl_phone_field: ^3.2.0
  shared_preferences: ^2.3.2
  image_picker: ^1.2.3
  flutter_bloc: ^9.1.1
  dio: ^5.7.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/imgs/
    - assets/icons/
    - assets/lottie/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Thin.ttf
          weight: 200
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
